<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SciacqueTEN - Exam Scores Converter</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fredoka:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="SciacqueTEN is a modern, fast, and weightless tool for teachers to convert student test scores to a base-10 scale instantly.">
    <meta name="keywords"
        content="grade converter,score converter, teacher tools, school grades, base 10 conversion, student evaluation, education software">
    <meta name="author" content="cellicom">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/cellicom/sciacqueTEN">
    <meta property="og:title" content="SciacqueTEN - Exam Scores Converter">
    <meta property="og:description"
        content="The ultimate tool for teachers to manage student evaluation scores efficiently.">
    <meta property="og:image" content="https://github.com/cellicom/sciacqueTEN/raw/main/icon.png">

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container mt-3">
        <header class="row align-items-center mb-4">
            <div class="col-md-3 d-none d-md-block"></div>

            <div class="col-md-6 text-center">
                <h1 class="fw-bold title-font text-primary mb-0 sciacqueten-title">
                    👩🏻‍🏫 SciacqueTEN
                </h1>
            </div>

            <div class="col-md-3 d-flex justify-content-center justify-content-md-end align-items-center gap-3">
                <button id="settingsToggle" class="btn btn-link link-body-emphasis p-0 theme-toggle" title="Settings"
                    data-bs-toggle="modal" data-bs-target="#settingsModal">
                    <i class="bi bi-gear-fill fs-4"></i>
                </button>
                <button id="helpToggle" class="btn btn-link link-body-emphasis p-0 theme-toggle" title="Help"
                    data-bs-toggle="modal" data-bs-target="#helpModal">
                    <i class="bi bi-question-circle-fill fs-4"></i>
                </button>
            </div>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card mb-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="maxScore" class="form-label fw-semibold" id="lblMaxScore">Punteggio
                                Massimo</label>
                            <div class="input-group">
                                <input type="number" id="maxScore" class="form-control" placeholder="es. 100" min="1">
                                <button class="btn btn-danger" type="button" id="clearMax" title="Pulisci">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <button id="resetAll" class="btn btn-danger w-100">
                                <i class="bi bi-arrow-clockwise me-2"></i><span id="txtReset All">Ricomincia</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <div class="glass-card h-100">
                            <h5 class="mb-4 d-flex justify-content-between align-items-center">
                                <span id="lblScoresList">Punteggi</span>
                                <div class="d-flex gap-2">
                                    <button id="voiceToggle" class="btn btn-primary btn-sm rounded-3"
                                        title="Registrazione Vocale">
                                        <i class="bi bi-mic-fill"></i>
                                    </button>
                                    <button id="addScore" class="btn btn-light btn-sm rounded-3" title="Aggiungi">
                                        <i class="bi bi-plus-lg"></i>
                                    </button>
                                </div>
                            </h5>
                            <div id="scoresContainer">
                                <!-- Score rows will be injected here -->
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="glass-card shadow-sm h-100">
                            <div class="result-header mb-4">
                                <div class="d-flex align-items-center gap-2">
                                    <h5 class="mb-0" id="lblResults">Risultati</h5>
                                    <button id="btnPlayResults"
                                        class="btn btn-sm btn-link p-0 d-none text-decoration-none"
                                        title="Riproduci Risultati">
                                        <i class="bi bi-play-circle-fill fs-5 text-primary"></i>
                                    </button>
                                </div>
                                <div class="format-switch" id="formatSwitch">
                                    <div class="format-switch-slider"></div>
                                    <div class="format-switch-option active" data-mode="half">½</div>
                                    <div class="format-switch-option" data-mode="decimal">.5</div>
                                </div>
                            </div>

                            <div class="mb-4 text-center border-bottom pb-4">
                                <small class="text-muted d-block text-uppercase fw-bold mb-1" id="lblSummary">Punteggio
                                    Totale / Massimo</small>
                                <span class="fs-1 fw-bold text-primary" id="resSummary">- / -</span>
                            </div>

                            <div class="row g-3">
                                <div class="col-6">
                                    <div class="result-badge h-100 d-flex flex-column justify-content-center">
                                        <small class="text-muted d-block" id="lblDecimal">Decimale</small>
                                        <span class="fs-4 fw-bold" id="resDecimal">-</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="flip-card" id="gradeFlipCard">
                                        <div class="flip-card-inner">
                                            <div class="flip-card-front">
                                                <div
                                                    class="result-badge border-primary h-100 d-flex flex-column justify-content-center">
                                                    <small class="text-primary d-block fw-semibold"
                                                        id="lblSuggested">Suggerito</small>
                                                    <span class="fs-4 fw-bold text-primary" id="resSuggested">-</span>
                                                </div>
                                            </div>
                                            <div class="flip-card-back">
                                                <div
                                                    class="result-badge border-primary h-100 d-flex flex-column justify-content-center">
                                                    <small class="text-primary d-block fw-semibold"
                                                        id="lblSuggestedBack">Suggerito</small>
                                                    <span class="fs-4 fw-bold text-primary"
                                                        id="resSuggestedBackVal">-</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="result-badge h-100 d-flex flex-column justify-content-center">
                                        <small class="text-muted d-block" id="lblFloor">Difetto</small>
                                        <span class="fs-4 fw-bold" id="resFloor">-</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="result-badge h-100 d-flex flex-column justify-content-center">
                                        <small class="text-muted d-block" id="lblCeil">Eccesso</small>
                                        <span class="fs-4 fw-bold" id="resCeil">-</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-auto">
        <div class="container">
            <p class="mb-1">Made with <span class="text-danger" id="heartEasterEgg"
                    style="cursor: pointer;">&hearts;</span> by <a href="https://github.com/cellicom"
                    target="_blank">cellicom</a></p>
            <a href="https://github.com/cellicom/sciacqueTEN" target="_blank" class="text-muted small">
                <i class="bi bi-github me-1"></i>View Repository on Github
            </a>
        </div>
    </footer>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary" id="settingsModalLabel">Impostazioni</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <div class="d-flex justify-content-between align-items-center p-3 rounded-3 border-0 shadow-sm h-100"
                                style="background-color: var(--card-bg, #fff);">
                                <label for="langSelect" class="form-label text-muted small fw-bold text-uppercase mb-0"
                                    id="lblLanguage">Lingua</label>
                                <select id="langSelect" class="form-select border-0 shadow-sm lang-select w-50"
                                    style="background-color: var(--card-bg, #fff);">
                                    <!-- Dynamically populated -->
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="d-flex justify-content-between align-items-center p-3 rounded-3 border-0 shadow-sm h-100"
                                style="background-color: var(--card-bg, #fff);">
                                <label class="form-label text-muted small fw-bold text-uppercase mb-0"
                                    id="lblTheme">Tema</label>
                                <div id="themeToggleOptions" class="ios-toggle theme-toggle" title="Toggle Theme">
                                    <div class="ios-toggle-icons">
                                        <i class="bi bi-sun-fill" id="sunIcon"></i>
                                        <i class="bi bi-moon-fill" id="moonIcon"></i>
                                    </div>
                                    <div class="ios-toggle-knob"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4 d-flex justify-content-between align-items-center p-3 rounded-3 border-0 shadow-sm"
                        style="background-color: var(--card-bg, #fff);">
                        <label for="micSelect" class="form-label text-muted small fw-bold text-uppercase mb-0"
                            id="lblMicrophone">Microfono</label>
                        <select id="micSelect" class="form-select border-0 shadow-sm w-50"
                            style="background-color: var(--card-bg, #fff);">
                            <option value="default" id="lblDefaultMic">Predefinito</option>
                        </select>
                    </div>

                    <div class="mb-2 p-3 rounded-3 border-0 shadow-sm" style="background-color: var(--card-bg, #fff);">
                        <label class="form-label text-muted small fw-bold text-uppercase d-block mb-3"
                            id="lblReadResults">Leggi risultato dopo registrazione</label>

                        <div class="row g-2">
                            <div class="col-12 col-md-6">
                                <div class="form-check form-switch mb-2 mb-md-0">
                                    <input class="form-check-input speak-setting" type="checkbox" role="switch"
                                        id="speakSummary" data-setting="summary">
                                    <label class="form-check-label" for="speakSummary" id="lblSpeakSummary">Punteggio
                                        Totale</label>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-check form-switch mb-2 mb-md-0">
                                    <input class="form-check-input speak-setting" type="checkbox" role="switch"
                                        id="speakDecimal" data-setting="decimal">
                                    <label class="form-check-label" for="speakDecimal"
                                        id="lblSpeakDecimal">Decimale</label>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-check form-switch mb-2 mb-md-0">
                                    <input class="form-check-input speak-setting" type="checkbox" role="switch"
                                        id="speakSuggested" data-setting="suggested">
                                    <label class="form-check-label" for="speakSuggested"
                                        id="lblSpeakSuggested">Suggerito</label>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-check form-switch mb-2 mb-md-0">
                                    <input class="form-check-input speak-setting" type="checkbox" role="switch"
                                        id="speakFloor" data-setting="floor">
                                    <label class="form-check-label" for="speakFloor" id="lblSpeakFloor">Difetto</label>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <div class="form-check form-switch">
                                    <input class="form-check-input speak-setting" type="checkbox" role="switch"
                                        id="speakCeil" data-setting="ceil">
                                    <label class="form-check-label" for="speakCeil" id="lblSpeakCeil">Eccesso</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Help Modal -->
    <div class="modal fade" id="helpModal" tabindex="-1" aria-labelledby="helpModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-primary" id="helpModalLabel"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="helpIntro" class="mb-3"></p>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3 d-flex align-items-start">
                            <i class="bi bi-keyboard text-primary me-3 fs-5"></i>
                            <span id="helpFeatureEnter"></span>
                        </li>
                        <li class="mb-3 d-flex align-items-start">
                            <i class="bi bi-mic text-primary me-3 fs-5"></i>
                            <span id="helpFeatureVoice"></span>
                        </li>
                        <li class="mb-3 d-flex align-items-start">
                            <i class="bi bi-stop-circle text-primary me-3 fs-5"></i>
                            <span id="helpFeatureVoiceStop"></span>
                        </li>
                        <li class="mb-3 d-flex align-items-start">
                            <i class="bi bi-arrow-left-right text-primary me-3 fs-5"></i>
                            <span id="helpFeatureFormat"></span>
                        </li>
                        <li class="d-flex align-items-start">
                            <i class="bi bi-heart-fill text-danger me-3 fs-5"></i>
                            <span id="helpFeatureSurprise"></span>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary rounded-3 w-100" data-bs-dismiss="modal"
                        id="btnCloseModal"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Recording Modal -->
    <div class="modal fade" id="recordingModal" tabindex="-1" aria-labelledby="recordingModalLabel" aria-hidden="true"
        data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold title-font" id="recordingModalLabel">
                        <i class="bi bi-mic-fill text-danger me-2 pulse-icon"></i><span
                            id="lblRecordingTitle">Registrazione...</span>
                    </h5>
                    <!-- No close button, user must say stop or we close it programmatically -->
                </div>
                <div class="modal-body text-center">
                    <canvas id="audioWaveCanvas" width="300" height="100" class="w-100 mb-3 rounded-3"
                        style="background: rgba(0,0,0,0.1);"></canvas>

                    <p class="text-muted small mb-4" id="lblVoiceStopInstruction"></p>

                    <div class="text-start">
                        <small class="text-muted fw-bold text-uppercase" id="lblRawVoiceTitle">Testo
                            riconosciuto:</small>
                        <div id="rawVoiceDebug" class="p-2 rounded-3 mt-1 raw-voice-container text-wrap text-break"
                            style="min-height: 60px; background: var(--bg); color: var(--text);">
                            <!-- Raw text goes here -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-outline-primary rounded-3 px-4 me-2"
                        id="btnRestartRecordingModal" style="display: none;">
                        <i class="bi bi-mic-fill me-2"></i><span id="lblRestartRecordingBtn">Riavvia in ascolto</span>
                    </button>
                    <button type="button" class="btn btn-danger rounded-3 px-4" id="btnStopRecordingModal">
                        <i class="bi bi-stop-circle me-2"></i><span id="lblStopRecordingBtn">Stop</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <!-- i18n dictionary -->
    <script src="i18n.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
